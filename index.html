<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テスト</title>
</head>
<body style="background:black;color:white;">

<div id="story"></div>
<div id="choices"></div>

<script>
let gender = null;

function render(text, choices){
 document.getElementById("story").innerText = text;
 const c = document.getElementById("choices");
 c.innerHTML = "";

 choices.forEach(btn=>{
  const b = document.createElement("button");
  b.innerText = btn.text;
  b.onclick = btn.onClick;
  c.appendChild(b);
 });
}

function start(){
 render("犬か猫か選べ",[
  {
   text:"犬",
   onClick:()=>{
    gender="男主人公";
    scene2();
   }
  },
  {
   text:"猫",
   onClick:()=>{
    gender="女主人公";
    scene2();
   }
  }
 ]);
}

function scene2(){
 render(gender + "\n\n扉が3つある",[
  {text:"OK", onClick:start}
 ]);
}

start();
</script>

</body>
</html>
