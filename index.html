<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>閉ざされた記録 v32</title>
  <style>
    body{
      margin:0;
      background:#05070c;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    }
    .wrap{
      max-width:820px;
      margin:0 auto;
      min-height:100vh;
      padding:20px 16px 40px;
      box-sizing:border-box;
      background:linear-gradient(to bottom,#0d1220,#05070c);
    }
    .stage{
      color:#9fd0ff;
      font-size:15px;
      margin-bottom:12px;
    }
    .panel{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:20px;
      margin-bottom:16px;
    }
    .bg{
      min-height:180px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#ddd;
      background:
        radial-gradient(circle at top, rgba(70,90,170,0.22), transparent 55%),
        linear-gradient(to bottom,#151a28,#090b10);
    }
    .speaker{
      color:#9fe0d5;
      font-size:13px;
      margin:8px 0;
      letter-spacing:0.05em;
    }
    .story{
      white-space:pre-wrap;
      line-height:1.9;
      font-size:22px;
      min-height:220px;
    }
    .status{
      white-space:pre-wrap;
      line-height:1.8;
      font-size:15px;
      color:#d5d5d5;
    }
    .choices{
      display:grid;
      gap:12px;
    }
    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:16px;
      background:#3a3554;
      color:#fff;
      font-size:22px;
      cursor:pointer;
    }
    .sub{
      background:#2b3a63;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="stage" class="stage">ホテル編 / 第1部屋</div>

    <div id="bg" class="panel bg">背景イメージ：暗闇の部屋</div>

    <div id="speaker" class="speaker">SYSTEM</div>

    <div id="story" class="panel story"></div>

    <div id="status" class="panel status"></div>

    <div id="choices" class="choices"></div>

    <div class="choices" style="margin-top:12px;">
      <button class="sub" onclick="showStart()">最初から</button>
    </div>
  </div>

  <script>
    let gender = "";
    let animal = "";

    function updateStatus() {
      document.getElementById("status").innerText =
        "主人公：" + (gender || "未決定") + "\n" +
        "動物：" + (animal || "未決定");
    }

    function render(stage, bg, speaker, text, choices) {
      document.getElementById("stage").innerText = stage;
      document.getElementById("bg").innerText = bg;
      document.getElementById("speaker").innerText = speaker;
      document.getElementById("story").innerText = text;
      updateStatus();

      const box = document.getElementById("choices");
      box.innerHTML = "";

      choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.innerText = choice.text;
        btn.onclick = choice.onClick;
        box.appendChild(btn);
      });
    }

    function showStart() {
      gender = "";
      animal = "";
      render(
        "ホテル編 / 第1部屋",
        "背景イメージ：暗闇の部屋",
        "SYSTEM",
`暗闇の部屋。

犬か猫の鳴き声がする。`,
        [
          {
            text: "犬を選ぶ",
            onClick: () => {
              gender = "男主人公";
              animal = "犬";
              showDoorRoom();
            }
          },
          {
            text: "猫を選ぶ",
            onClick: () => {
              gender = "女主人公";
              animal = "猫";
              showDoorRoom();
            }
          }
        ]
      );
    }

    function showDoorRoom() {
      const line = gender === "女主人公"
        ? "扉が3つ……？ なんか全部、嫌な感じがする……。"
        : "……扉が3つ……。どれも普通じゃない。";

      const animalLine = animal === "猫"
        ? "猫は3つの扉の前を静かに歩き、一瞬だけ左を見た。"
        : "犬は左の扉の前で止まり、低く唸っている。";

      render(
        "ホテル編 / 第2部屋",
        "背景イメージ：3つの扉のある広間",
        "SYSTEM",
`${gender}

${line}

左の扉からは冷たい空気が流れ込んでくる。

${animalLine}

ここで進む場所を決めなければならない。`,
        [
          {
            text: "左の扉に入る（ホテル）",
            onClick: showHotelLobby
          },
          {
            text: animal + "に任せる",
            onClick: showHotelLobby
          }
        ]
      );
    }

    function showHotelLobby() {
      const line = gender === "女主人公"
        ? "ここ……ホテル……？ 静かすぎる……。"
        : "……ホテル……？ 誰もいない。";

      render(
        "ホテル編 / 第3部屋",
        "背景イメージ：ホテルのロビー",
        "SYSTEM",
`${gender}

${line}

フロントには誰もいない。
時計は止まり、シャンデリアだけが揺れている。

床には新しい足跡がある。`,
        [
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    showStart();
  </script>
</body>
</html>
