<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>閉ざされた記録 - ホテル編</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: #f2f2f2;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .game-wrap {
      max-width: 900px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(to bottom, #11131a, #07080c);
    }

    .top-bar {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: #cfcfcf;
    }

    .stage {
      padding: 12px 16px;
      font-size: 13px;
      color: #9ad0ff;
    }

    .bg-panel {
      margin: 0 16px;
      height: 220px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      color: #d8d8d8;
      background:
        radial-gradient(circle at top, rgba(70,80,120,0.25), transparent 50%),
        linear-gradient(to bottom, #1a1d29, #0d0f16);
    }

    .content {
      padding: 18px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    .speaker {
      font-size: 13px;
      color: #8dd3c7;
      letter-spacing: 0.04em;
    }

    .text-box {
      min-height: 180px;
      white-space: pre-wrap;
      line-height: 1.9;
      font-size: 18px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }

    .status-box {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      font-size: 14px;
      line-height: 1.7;
      color: #d7d7d7;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    button.choice-btn,
    button.control-btn {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      background: #26324f;
    }

    button.choice-btn:hover,
    button.control-btn:hover {
      filter: brightness(1.08);
    }

    .control-row {
      display: flex;
      gap: 10px;
    }

    .control-row .control-btn {
      background: #3b2d56;
    }

    .small {
      font-size: 13px;
      color: #bdbdbd;
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <div class="top-bar">
      <div id="titleText">閉ざされた記録 - ホテル編</div>
      <div id="progressText">開始前</div>
    </div>

    <div class="stage" id="stageText">ホテル編 / プロローグ</div>

    <div class="bg-panel" id="bgPanel">
      背景イメージ：暗闇の部屋
    </div>

    <div class="content">
      <div class="speaker" id="speakerName">SYSTEM</div>

      <div class="text-box" id="storyText"></div>

      <div class="status-box" id="statusBox"></div>

      <div class="choices" id="choices"></div>

      <div class="control-row">
        <button class="control-btn" id="restartBtn">最初から</button>
      </div>

      <div class="small">
        後から背景画像・立ち絵・犬猫画像を追加できます。
      </div>
    </div>
  </div>

  <script>
    const state = {
      protagonistGender: null,
      animal: null,
      trustAnimal: 0,
      suspicionAnimal: 0,
      truthFlags: 0,
      dangerFlags: 0,
      petAlive: true,
      petBetrayed: false,
      route: "hotel"
    };

    const storyText = document.getElementById("storyText");
    const choices = document.getElementById("choices");
    const speakerName = document.getElementById("speakerName");
    const stageText = document.getElementById("stageText");
    const bgPanel = document.getElementById("bgPanel");
    const progressText = document.getElementById("progressText");
    const statusBox = document.getElementById("statusBox");
    const restartBtn = document.getElementById("restartBtn");

    function protagonistLabel() {
      return state.protagonistGender === "female" ? "女主人公" : "男主人公";
    }

    function protagonistLine(maleText, femaleText) {
      return `${protagonistLabel()}\n\n${state.protagonistGender === "female" ? femaleText : maleText}`;
    }

    function updateStatus() {
      statusBox.innerHTML =
        "主人公：" + (
          state.protagonistGender === "male" ? "男" :
          state.protagonistGender === "female" ? "女" : "未決定"
        ) + "<br>" +
        "動物：" + (
          state.animal === "dog" ? "犬" :
          state.animal === "cat" ? "猫" : "未決定"
        ) + "<br>" +
        "信頼：" + state.trustAnimal + " / 疑い：" + state.suspicionAnimal + "<br>" +
        "真相フラグ：" + state.truthFlags + " / 危険フラグ：" + state.dangerFlags + "<br>" +
        "動物：" + (state.petAlive ? "生存" : "死亡") + " / 裏切り：" + (state.petBetrayed ? "あり" : "なし");
    }

    function renderScene(scene) {
      speakerName.textContent = scene.speaker || "SYSTEM";
      storyText.textContent = scene.text;
      stageText.textContent = scene.stage;
      bgPanel.textContent = scene.bg;
      progressText.textContent = scene.progress;
      updateStatus();

      choices.innerHTML = "";

      scene.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice.text;
        btn.onclick = () => {
          if (choice.effect) choice.effect();
          if (typeof choice.next === "function") {
            choice.next();
          } else {
            renderScene(choice.next);
          }
        };
        choices.appendChild(btn);
      });
    }

    function restartGame() {
      state.protagonistGender = null;
      state.animal = null;
      state.trustAnimal = 0;
      state.suspicionAnimal = 0;
      state.truthFlags = 0;
      state.dangerFlags = 0;
      state.petAlive = true;
      state.petBetrayed = false;
      state.route = "hotel";
      renderScene(scene1);
    }

    restartBtn.onclick = restartGame;

    function endingScene(type) {
      if (type === "good") {
        return {
          speaker: "END",
          stage: "ホテル編 / エンディング",
          bg: "背景イメージ：夜明け前のホテル出口",
          progress: "END 1 / 無事に帰還",
          text:
`【無事に帰還】

${protagonistLabel()}は幽霊を倒した。

その瞬間、失われていた記憶が一気に戻る。
自分はペットを探してこのホテルに入り、過去の事件と再び向き合っていたのだと知る。

${state.animal === "dog" ? "犬" : "猫"}は最後までそばにいた。

${protagonistLabel()}はゆっくりとホテルの外へ出る。
冷たい夜気の中で、ようやく本当の現実に帰ってきた。`,
          choices: [
            { text: "最初からやり直す", next: scene1 }
          ]
        };
      }

      if (type === "middle") {
        return {
          speaker: "END",
          stage: "ホテル編 / エンディング",
          bg: "背景イメージ：ホテル外の暗い駐車場",
          progress: "END 2 / 何かを犠牲にして助かる",
          text:
`【何かを犠牲にしてなんとか助かる】

${protagonistLabel()}はホテルから脱出した。

だが、${state.animal === "dog" ? "犬" : "猫"}はもう戻ってこない。
逃げることはできたのに、何かがずっと背後に残っている。

記憶は戻らない。
ただ夜になるたび、見えない恐怖に怯えながら暮らすことになる。

本当に助かったのか、自分でも分からない。`,
          choices: [
            { text: "最初からやり直す", next: scene1 }
          ]
        };
      }

      return {
        speaker: "END",
        stage: "ホテル編 / エンディング",
        bg: "背景イメージ：闇の中のホテル最上階",
        progress: "END 3 / 襲われて終了",
        text:
`【襲われて終了】

${protagonistLabel()}は脱出できなかった。

${state.animal === "dog" ? "犬" : "猫"}はどこかへ逃げていく。
その瞬間、${protagonistLabel()}はすべてを思い出す。

この幽霊は、過去に自分を殺した相手だった。
そして死んだ後もなお、自分を追い続けていたのだ。

思い出した時にはもう遅い。
恐怖は終わらない。`,
        choices: [
          { text: "最初からやり直す", next: scene1 }
        ]
      };
    }

    const scene1 = {
      speaker: "SYSTEM",
      stage: "ホテル編 / 第1部屋",
      bg: "背景イメージ：真っ暗な部屋",
      progress: "1 / 10",
      text:
`…………。

意識がゆっくりと戻る。

目を開けても、何も見えない。
真っ暗だ。

遠くから小さな鳴き声が聞こえる。

「……ワン……」
「……ニャー……」

どちらかが、こちらを呼んでいる気がする。`,
      choices: [
        {
          text: "犬の鳴き声の方へ行く",
          effect: () => {
            state.protagonistGender = "male";
            state.animal = "dog";
            state.trustAnimal += 1;
          },
          next: () => renderScene(scene2)
        },
        {
          text: "猫の鳴き声の方へ行く",
          effect: () => {
            state.protagonistGender = "female";
            state.animal = "cat";
            state.trustAnimal += 1;
          },
          next: () => renderScene(scene2)
        },
        {
          text: "動かず様子を見る",
          effect: () => {
            state.dangerFlags += 1;
            state.suspicionAnimal += 1;
            state.protagonistGender = "male";
            state.animal = "dog";
          },
          next: () => renderScene({
            speaker: "SYSTEM",
            stage: "ホテル編 / 第1部屋",
            bg: "背景イメージ：真っ暗な部屋",
            progress: "1 / 10",
            text:
`鳴き声が止まる。

静かすぎる。

背後で何かが動いた気がした。

あなたは反射的に犬の鳴き声の方へ走る。`,
            choices: [
              { text: "先へ進む", next: scene2 }
            ]
          })
        }
      ]
    };

    const scene2 = {
      speaker: "SYSTEM",
      stage: "ホテル編 / 第2部屋",
      bg: "背景イメージ：3つの扉のある広間",
      progress: "2 / 10",
      text:
`${protagonistLine("……扉が3つ……。どれも普通じゃない。", "3つの扉……？ なんか全部、嫌な感じがする……。")}

左の扉からは冷たい空気が流れ込んでくる。

${state.animal === "dog" ? "犬は左の扉の前で止まり、低く唸っている。" : "猫は3つの扉の前を静かに歩き、一瞬だけ左を見た。"}

ここで進む場所を決めなければならない。`,
      choices: [
        {
          text: "左の扉に入る（ホテル）",
          effect: () => {},
          next: () => renderScene(scene3)
        },
        {
          text: "動物に任せる",
          effect: () => {
            state.trustAnimal += 2;
            if (state.animal === "cat") {
              state.petBetrayed = true;
            }
          },
          next: () => renderScene({
            speaker: "SYSTEM",
            stage: "ホテル編 / 第2部屋",
            bg: "背景イメージ：3つの扉のある広間",
            progress: "2 / 10",
            text:
`${state.animal === "dog"
  ? "犬は左の扉へ向かう。迷いはない。だが、この確信が少しだけ怖い。"
  : "猫はためらうように歩き、最後に左の扉の前で止まる。……本当に、信じていいのだろうか。"
}

あなたはその後を追う。`,
            choices: [
              { text: "先へ進む", next: scene3 }
            ]
          })
        }
      ]
    };

    const scene3 = {
      speaker: "SYSTEM",
      stage: "ホテル編 / 第3部屋",
      bg: "背景イメージ：ホテルのロビー",
      progress: "3 / 10",
      text:
`${protagonistLine("……ホテル……？ 誰もいない。", "ここ……ホテル……？ 静かすぎる……。")}

フロントには誰もいない。
時計は止まり、シャンデリアだけが揺れている。

床には新しい足跡がある。`,
      choices: [
        {
          text: "フロントを調べる",
          effect: () => { state.truthFlags += 1; },
          next: () => renderScene(scene4)
        },
        {
          text: "階段へ向かう",
          effect: () => { state.dangerFlags += 1; },
          next: () => renderScene(scene4)
        },
        {
          text: "動物の行動を見る",
          effect: () => {
            if (state.animal === "dog") state.trustAnimal += 1;
            else state.truthFlags += 1;
          },
          next: () => renderScene(scene4)
        }
      ]
    };

    const scene4 = {
      speaker: "SYSTEM",
      stage: "ホテル編 / 第4部屋",
      bg: "背景イメージ：長い廊下",
      progress: "4 / 10",
      text:
`${protagonistLine("……誰かいるのか？", "今……足音、したよね……？")}

長い廊下の奥から足音が近づいてくる。

だが、姿は見えない。`,
      choices: [
        {
          text: "隠れる",
          effect: () => {},
          next: () => renderScene(scene5)
        },
        {
          text: "走って逃げる",
          effect: () => { state.dangerFlags += 1; },
          next: () => renderScene(scene5)
        },
        {
          text: "振り返る",
          effect: () => { state.truthFlags += 1; state.dangerFlags += 1; },
          next: () => renderScene({
            speaker: "SYSTEM",
            stage: "ホテル編 / 第4部屋",
            bg: "背景イメージ：長い廊下",
            progress: "4 / 10",
            text:
`${protagonistLine("……っ！ 今、いた……！", "……見えた……何かいた……。")}

振り返った瞬間だけ、白い輪郭が見えた。`,
            choices: [
              { text: "先へ進む", next: scene5 }
            ]
          })
        }
      ]
    };

    const scene5 = {
      speaker: "SYSTEM",
      stage: "ホテル編 / 第5部屋",
      bg: "背景イメージ：客室エリア",
      progress: "5 / 10",
      text:
`${protagonistLine("どの部屋だ……何か違和感がある。", "全部同じに見える……でも、どこか違う……。")}

いくつもの客室が並んでいる。

${state.animal === "dog"
  ? "犬は一つの扉の前で止まった。"
  : "猫は犬とは違う方向へ歩いていく。"
}`,
      choices: [
        {
          text: state.animal === "dog" ? "犬を信じる" : "猫を信じる",
          effect: () => {
            state.trustAnimal += 2;
            if (state.animal === "cat") {
              state.petBetrayed = true;
              state.dangerFlags += 1;
            }
          },
          next: () => renderScene(scene6)
        },
        {
          text: "自分で選ぶ",
          effect: () => {
            state.suspicionAnimal += 1;
          },
          next: () => renderScene(scene6)
        },
        {
          text: "どちらも信用しない",
          effect: () => {
            state.suspicionAnimal += 2;
            state.dangerFlags += 1;
          },
          next: () => renderScene(scene6)
        }
      ]
    };

    const scene6 = {
      speaker: "SYSTEM",
      stage: "ホテル編 / 第6部屋",
      bg: "背景イメージ：古いエレベーター",
      progress: "6 / 10",
      text:
`${protagonistLine("……また同じ階……？", "嘘……戻ってる……。")}

エレベーターは何度乗っても同じ階に戻る。

数字表示が壊れている。`,
      choices: [
        {
          text: "エレベーターを使い続ける",
          effect: () => {
            state.truthFlags += 1;
            state.dangerFlags += 1;
          },
          next: () => renderScene(scene7)
        },
        {
          text: "非常階段に切り替える",
          effect: () => {},
          next: () => renderScene(scene7)
        },
        {
          text: "動物の反応を見る",
          effect: () => {
            if (state.animal === "cat") {
              state.truthFlags += 1;
            } else {
              state.trustAnimal += 1;
            }
          },
          next: () => renderScene(scene7)
        }
      ]
    };

    const scene7 = {
      speaker: "SYSTEM",
      stage: "ホテル編 / 第7部屋",
      bg: "背景イメージ：ホテルのレストラン",
      progress: "7 / 10",
      text:
`${protagonistLine("……音を立てるな。", "やだ……勝手に動いてる……。")}

レストランの奥で皿が揺れる。

音を立てれば、何かが来る。`,
      choices: [
        {
          text: "静かに進む",
          effect: () => {},
          next: () => renderScene(scene8)
        },
        {
          text: "物音の原因を調べる",
          effect: () => {
            state.truthFlags += 1;
            state.dangerFlags += 1;
          },
          next: () => renderScene(scene8)
        },
        {
          text: "動物を先に行かせる",
          effect: () => {
            state.petAlive = false;
            state.dangerFlags += 1;
          },
          next: () => renderScene({
            speaker: "SYSTEM",
            stage: "ホテル編 / 第7部屋",
            bg: "背景イメージ：ホテルのレストラン",
            progress: "7 / 10",
            text:
`${state.animal === "dog" ? "犬" : "猫"}は奥へ走った。

次の瞬間、悲鳴のような音が響く。

あなたは助かった。
だが、もう戻ってこない。`,
            choices: [
              { text: "先へ進む", next: scene8 }
            ]
          })
        }
      ]
    };

    const scene8 = {
      speaker: "SYSTEM",
      stage: "ホテル編 / 第8部屋",
      bg: "背景イメージ：鏡の部屋",
      progress: "8 / 10",
      text:
`${protagonistLine("……鏡……？", "……なにこれ……。")}

壁一面が鏡で覆われている。

よく見ると、鏡の中の自分は動きが少し遅れている。`,
      choices: [
        {
          text: "鏡をじっと見る",
          effect: () => { state.truthFlags += 2; },
          next: () => renderScene(scene9)
        },
        {
          text: "鏡に近づく",
          effect: () => { state.dangerFlags += 1; },
          next: () => renderScene(scene9)
        },
        {
          text: "目を逸らす",
          effect: () => {},
          next: () => renderScene(scene9)
        },
        {
          text: "鏡を壊す",
          effect: () => {
            state.truthFlags += 1;
            state.dangerFlags += 2;
          },
          next: () => renderScene(scene9)
        }
      ]
    };

    const scene9 = {
      speaker: "SYSTEM",
      stage: "ホテル編 / 第9部屋",
      bg: "背景イメージ：地下記録室",
      progress: "9 / 10",
      text:
`${protagonistLine("……これ……俺の名前……？", "……これ……私……？")}

地下の記録室には、古い宿泊記録と写真が残されていた。

そこには、主人公の名前が記されている。`,
      choices: [
        {
          text: "記録を読む",
          effect: () => { state.truthFlags += 2; },
          next: () => renderScene(scene10)
        },
        {
          text: "写真だけ見る",
          effect: () => { state.truthFlags += 1; },
          next: () => renderScene(scene10)
        },
        {
          text: "怖くなって戻る",
          effect: () => { state.dangerFlags += 1; },
          next: () => renderScene(scene10)
        },
        {
          text: "動物に任せる",
          effect: () => {
            if (state.animal === "cat") {
              state.truthFlags += 2;
              state.petBetrayed = true;
            } else {
              state.truthFlags += 1;
            }
          },
          next: () => renderScene(scene10)
        }
      ]
    };

    const scene10 = {
      speaker: "SYSTEM",
      stage: "ホテル編 / 第10部屋",
      bg: "背景イメージ：最上階の暗い部屋",
      progress: "10 / 10",
      text:
`${protagonistLine("……お前か……！", "……ずっと……追ってきてたの……？")}

最上階で、ついに幽霊がはっきりと姿を現す。

すべてがここで決まる。`,
      choices: [
        {
          text: "戦う",
          effect: () => {},
          next: () => {
            if (state.truthFlags >= 5 && state.petAlive && !state.petBetrayed) {
              renderScene(endingScene("good"));
            } else if (state.truthFlags >= 3) {
              renderScene(endingScene("middle"));
            } else {
              renderScene(endingScene("bad"));
            }
          }
        },
        {
          text: "逃げる",
          effect: () => {},
          next: () => {
            if (state.petAlive && state.truthFlags >= 3) {
              renderScene(endingScene("middle"));
            } else {
              renderScene(endingScene("bad"));
            }
          }
        },
        {
          text: "受け入れる",
          effect: () => {
            state.dangerFlags += 2;
          },
          next: () => renderScene(endingScene("bad"))
        },
        {
          text: "動物をかばう",
          effect: () => {
            if (state.petAlive) {
              state.truthFlags += 1;
            }
          },
          next: () => {
            if (state.truthFlags >= 5 && state.petAlive) {
              renderScene(endingScene("good"));
            } else {
              renderScene(endingScene("middle"));
            }
          }
        },
        {
          text: "動物を見捨てる",
          effect: () => {
            state.petAlive = false;
          },
          next: () => renderScene(endingScene("middle"))
        }
      ]
    };

    renderScene(scene1);
  </script>
