<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>閉ざされた記録 v35</title>
  <style>
    body{
      margin:0;
      background:#05070c;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    }
    .wrap{
      max-width:820px;
      margin:0 auto;
      min-height:100vh;
      padding:20px 16px 40px;
      box-sizing:border-box;
      background:linear-gradient(to bottom,#0d1220,#05070c);
    }
    .stage{
      color:#9fd0ff;
      font-size:15px;
      margin-bottom:12px;
    }
    .panel{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:20px;
      margin-bottom:16px;
    }
    .bg{
      min-height:180px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#ddd;
      background:
        radial-gradient(circle at top, rgba(70,90,170,0.22), transparent 55%),
        linear-gradient(to bottom,#151a28,#090b10);
    }
    .speaker{
      color:#9fe0d5;
      font-size:13px;
      margin:8px 0;
      letter-spacing:0.05em;
    }
    .story{
      white-space:pre-wrap;
      line-height:1.9;
      font-size:22px;
      min-height:240px;
    }
    .status{
      white-space:pre-wrap;
      line-height:1.8;
      font-size:15px;
      color:#d5d5d5;
    }
    .choices{
      display:grid;
      gap:12px;
    }
    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:16px;
      background:#3a3554;
      color:#fff;
      font-size:22px;
      cursor:pointer;
    }
    .sub{
      background:#2b3a63;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="stage" class="stage">共通編 / 第1部屋</div>
    <div id="bg" class="panel bg">背景イメージ：暗闇の部屋</div>
    <div id="speaker" class="speaker">SYSTEM</div>
    <div id="story" class="panel story"></div>
    <div id="status" class="panel status"></div>
    <div id="choices" class="choices"></div>

    <div class="choices" style="margin-top:12px;">
      <button class="sub" onclick="playClickSound(); showStart();">最初から</button>
    </div>
  </div>

  <script>
    let gender = "";
    let animal = "";
    let route = "";
    let trust = 0;
    let suspicion = 0;
    let truth = 0;
    let danger = 0;
    let petAlive = true;
    let petBetrayed = false;

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new AudioContextClass();
      }
      return audioCtx;
    }

    function playTone(freq = 440, duration = 0.12, type = "sine", volume = 0.03) {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();

      gain.gain.setValueAtTime(volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

      osc.stop(ctx.currentTime + duration);
    }

    function playClickSound() {
      playTone(700, 0.06, "square", 0.02);
    }

    function playSuccessSound() {
      playTone(520, 0.08, "sine", 0.03);
      setTimeout(() => playTone(780, 0.10, "sine", 0.025), 70);
    }

    function playDangerSound() {
      playTone(180, 0.22, "sawtooth", 0.035);
    }

    function playScarySound() {
      playTone(120, 0.35, "triangle", 0.04);
      setTimeout(() => playTone(95, 0.45, "sawtooth", 0.03), 60);
    }

    function updateStatus() {
      document.getElementById("status").innerText =
        "主人公：" + (gender || "未決定") + "\n" +
        "動物：" + (animal || "未決定") + "\n" +
        "現在ルート：" + (route || "未選択") + "\n" +
        "信頼：" + trust + " / 疑い：" + suspicion + "\n" +
        "真相フラグ：" + truth + " / 危険フラグ：" + danger + "\n" +
        "動物：" + (petAlive ? "生存" : "死亡") + " / 裏切り：" + (petBetrayed ? "あり" : "なし");
    }

    function render(stage, bg, speaker, text, choices) {
      document.getElementById("stage").innerText = stage;
      document.getElementById("bg").innerText = bg;
      document.getElementById("speaker").innerText = speaker;
      document.getElementById("story").innerText = text;
      updateStatus();

      const box = document.getElementById("choices");
      box.innerHTML = "";

      choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.innerText = choice.text;
        btn.onclick = () => {
          playClickSound();
          choice.onClick();
        };
        box.appendChild(btn);
      });
    }

    function resetGameState() {
      gender = "";
      animal = "";
      route = "";
      trust = 0;
      suspicion = 0;
      truth = 0;
      danger = 0;
      petAlive = true;
      petBetrayed = false;
    }

    function showStart() {
      resetGameState();
      render(
        "共通編 / 第1部屋",
        "背景イメージ：暗闇の部屋",
        "SYSTEM",
`暗闇の部屋。

犬か猫の鳴き声がする。`,
        [
          {
            text: "犬を選ぶ",
            onClick: () => {
              gender = "男主人公";
              animal = "犬";
              trust += 1;
              showDoorRoom();
            }
          },
          {
            text: "猫を選ぶ",
            onClick: () => {
              gender = "女主人公";
              animal = "猫";
              trust += 1;
              showDoorRoom();
            }
          }
        ]
      );
    }

    function showDoorRoom() {
      const line = gender === "女主人公"
        ? "扉が3つ……？ なんか全部、嫌な感じがする……。"
        : "……扉が3つある。どれも普通じゃない。";

      const animalLine = animal === "猫"
        ? "猫は3つの扉の前を静かに歩き、一瞬だけ真ん中の扉を見た。"
        : "犬は左の扉の前で止まり、低く唸っている。";

      render(
        "共通編 / 第2部屋",
        "背景イメージ：3つの扉のある広間",
        "SYSTEM",
`${gender}

${line}

左の扉からは冷たい空気が流れ込んでくる。
真ん中の扉からは、消毒液のような匂いが漂ってくる。
右の扉は重く閉ざされ、機械のような音が漏れている。

${animalLine}

ここで進む場所を決めなければならない。`,
        [
          {
            text: "左の扉に入る（ホテル）",
            onClick: showHotelLobby
          },
          {
            text: "真ん中の扉に入る（廃病院）",
            onClick: showHospitalEntrance
          },
          {
            text: animal + "に任せる",
            onClick: () => {
              trust += 1;
              if (animal === "猫") {
                showHospitalEntrance();
              } else {
                showHotelLobby();
              }
            }
          }
        ]
      );
    }

    function showHotelLobby() {
      route = "ホテル";
      const line = gender === "女主人公"
        ? "ここ……ホテル……？ 静かすぎる……。"
        : "……ホテル……？ 誰もいない。";

      render(
        "ホテル編 / 第3部屋",
        "背景イメージ：ホテルのロビー",
        "SYSTEM",
`${gender}

${line}

フロントには誰もいない。
時計は止まり、シャンデリアだけが揺れている。

床には新しい足跡がある。`,
        [
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    function showHospitalEntrance() {
      route = "廃病院";
      playDangerSound();

      const line = gender === "女主人公"
        ? "ここ……病院……？ 空気が重い……。"
        : "……廃病院か。嫌な感じがする。";

      const animalLine = animal === "猫"
        ? "猫は薄暗い廊下の奥をじっと見ている。"
        : "犬は落ち着かず、床の匂いを嗅いでいる。";

      render(
        "廃病院編 / 第3部屋",
        "背景イメージ：廃病院の入口",
        "SYSTEM",
`${gender}

${line}

壁は汚れ、照明は点滅している。
遠くで金属が擦れるような音がした。

${animalLine}

この先に進めば、もう戻れない気がする。`,
        [
          {
            text: "廊下へ進む",
            onClick: showHospitalCorridor
          },
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    function showHospitalCorridor() {
      const line = gender === "女主人公"
        ? "……誰かいる……？"
        : "……気配がする。誰かいるな。";

      render(
        "廃病院編 / 第4部屋",
        "背景イメージ：長い病院の廊下",
        "SYSTEM",
`${gender}

${line}

長い廊下の先に、人影のようなものが見えた。

動いていない。
……だが、見られている気がする。

空気が一気に冷たくなる。`,
        [
          {
            text: "隠れる",
            onClick: showHospitalHideResult
          },
          {
            text: "逃げる",
            onClick: showHospitalRunResult
          },
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    function showHospitalHideResult() {
      if (trust >= 2 && !petBetrayed) {
        truth += 1;
        playSuccessSound();

        render(
          "廃病院編 / 第5部屋",
          "背景イメージ：診察室の影",
          "SYSTEM",
`${gender}

あなたは静かに物陰に身を隠した。

足音が近づく。
……止まった。

${animal === "猫"
  ? "猫が静かにこちらを見て、音もなく別の方向へ歩いた。人影はそちらへ視線を向ける。"
  : "犬が低く唸り、あなたの袖を軽く引いた。今は動くな、と伝えているようだった。"
}

やがて人影は反対方向へ歩いていく。

……助かった。`,
          [
            {
              text: "さらに奥へ進む",
              onClick: showHospitalReveal
            },
            {
              text: "最初から",
              onClick: showStart
            }
          ]
        );
      } else {
        danger += 1;
        petBetrayed = true;
        playDangerSound();

        render(
          "廃病院編 / 第5部屋",
          "背景イメージ：診察室の影",
          "SYSTEM",
`${gender}

あなたは物陰に身を隠した。

……だが、
${animal === "猫"
  ? "猫が突然走り出した。"
  : "犬が堪えきれずに短く吠えた。"
}

足音が止まる。

次の瞬間、
覆面の男が目の前に立っていた。`,
          [
            {
              text: "正体を見る",
              onClick: showHospitalFaceReveal
            },
            {
              text: "最初から",
              onClick: showStart
            }
          ]
        );
      }
    }

    function showHospitalRunResult() {
      danger += 1;

      if (animal === "猫" && trust >= 1) {
        petAlive = false;
        playDangerSound();

        render(
          "廃病院編 / 第5部屋",
          "背景イメージ：非常階段前",
          "SYSTEM",
`${gender}

あなたは全力で走り出した。

背後から足音。
近い。

その瞬間、猫が別方向へ走り出した。
男の気配がそちらへ向かう。

……助かった。

だが、もう猫の姿は見えない。`,
          [
            {
              text: "先へ進む",
              onClick: showHospitalReveal
            },
            {
              text: "最初から",
              onClick: showStart
            }
          ]
        );
      } else if (animal === "犬" && trust <= 1) {
        petBetrayed = true;
        playDangerSound();

        render(
          "廃病院編 / 第5部屋",
          "背景イメージ：非常階段前",
          "SYSTEM",
`${gender}

あなたは反射的に走り出した。

だが、犬が大きく吠えた。

「まずい——」

足音が一気にこちらへ向かってくる。
逃げ切れない。`,
          [
            {
              text: "振り返る",
              onClick: showHospitalFaceReveal
            },
            {
              text: "最初から",
              onClick: showStart
            }
          ]
        );
      } else {
        playSuccessSound();

        render(
          "廃病院編 / 第5部屋",
          "背景イメージ：非常階段前",
          "SYSTEM",
`${gender}

あなたは全力で走り出した。

背後から足音。
近い。
だが、なんとか距離を取る。

息を切らしながら、あなたは暗い通路へ転がり込んだ。`,
          [
            {
              text: "先へ進む",
              onClick: showHospitalReveal
            },
            {
              text: "最初から",
              onClick: showStart
            }
          ]
        );
      }
    }

    function showHospitalFaceReveal() {
      truth += 2;
      danger += 1;
      playScarySound();

      render(
        "廃病院編 / 第6部屋",
        "背景イメージ：覆面の男の目前",
        "SYSTEM",
`${gender}

覆面の奥は空洞だった。

だが次の瞬間——
そこに浮かんだのは、

あなた自身の顔だった。

頭の奥が痛む。
記憶の断片が流れ込んでくる。

……この場所に、以前も来たことがある。`,
        [
          {
            text: "さらに奥へ進む",
            onClick: showHospitalEndingBranch
          },
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    function showHospitalReveal() {
      truth += 1;
      playSuccessSound();

      render(
        "廃病院編 / 第6部屋",
        "背景イメージ：手術記録の残る部屋",
        "SYSTEM",
`${gender}

薄暗い部屋に、古い記録が散らばっている。

患者名簿、手術記録、写真。
その中に、あなたに似た顔が写っていた。

背筋が冷える。

ここには、まだ知らない真実がある。`,
        [
          {
            text: "記録を読む",
            onClick: showHospitalEndingBranch
          },
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    function showHospitalEndingBranch() {
      if (truth >= 2 && petAlive && !petBetrayed) {
        playSuccessSound();

        render(
          "廃病院編 / エンディング",
          "背景イメージ：病院の外へ続く出口",
          "END",
`${gender}

あなたは廃病院から脱出した。

追ってきていた存在の正体はまだ曖昧だ。
だが、この場所で何かが起きていたことだけは確かだった。

${animal}も生きている。

完全な真相ではない。
それでも、あなたは外へ出ることができた。`,
          [
            {
              text: "最初から",
              onClick: showStart
            }
          ]
        );
      } else if (!petAlive || petBetrayed) {
        playDangerSound();

        render(
          "廃病院編 / エンディング",
          "背景イメージ：病院の外、曇った空",
          "END",
`${gender}

あなたはなんとか廃病院を抜け出した。

だが、${animal}は戻らない。
あの時の行動が正しかったのか、もう分からない。

背後の気配は消えていない。

助かったはずなのに、
何かを置いてきてしまった。`,
          [
            {
              text: "最初から",
              onClick: showStart
            }
          ]
        );
      } else {
        playScarySound();

        render(
          "廃病院編 / エンディング",
          "背景イメージ：暗闇の廊下",
          "END",
`${gender}

足音が止まる。

静かになった、と思った瞬間——
背後から肩を掴まれた。

あなたはここで終わる。

廃病院の闇は、
何も返してくれなかった。`,
          [
            {
              text: "最初から",
              onClick: showStart
            }
          ]
        );
      }
    }

    showStart();
  </script>
</body>
</html>
