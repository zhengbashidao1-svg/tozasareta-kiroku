<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>閉ざされた記録 v33</title>
  <style>
    body{
      margin:0;
      background:#05070c;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    }
    .wrap{
      max-width:820px;
      margin:0 auto;
      min-height:100vh;
      padding:20px 16px 40px;
      box-sizing:border-box;
      background:linear-gradient(to bottom,#0d1220,#05070c);
    }
    .stage{
      color:#9fd0ff;
      font-size:15px;
      margin-bottom:12px;
    }
    .panel{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:20px;
      margin-bottom:16px;
    }
    .bg{
      min-height:180px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#ddd;
      background:
        radial-gradient(circle at top, rgba(70,90,170,0.22), transparent 55%),
        linear-gradient(to bottom,#151a28,#090b10);
    }
    .speaker{
      color:#9fe0d5;
      font-size:13px;
      margin:8px 0;
      letter-spacing:0.05em;
    }
    .story{
      white-space:pre-wrap;
      line-height:1.9;
      font-size:22px;
      min-height:220px;
    }
    .status{
      white-space:pre-wrap;
      line-height:1.8;
      font-size:15px;
      color:#d5d5d5;
    }
    .choices{
      display:grid;
      gap:12px;
    }
    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:16px;
      background:#3a3554;
      color:#fff;
      font-size:22px;
      cursor:pointer;
    }
    .sub{
      background:#2b3a63;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="stage" class="stage">ホテル編 / 第1部屋</div>

    <div id="bg" class="panel bg">背景イメージ：暗闇の部屋</div>

    <div id="speaker" class="speaker">SYSTEM</div>

    <div id="story" class="panel story"></div>

    <div id="status" class="panel status"></div>

    <div id="choices" class="choices"></div>

    <div class="choices" style="margin-top:12px;">
      <button class="sub" onclick="showStart()">最初から</button>
    </div>
  </div>

  <script>
    let gender = "";
    let animal = "";
    let route = "";

    function updateStatus() {
      document.getElementById("status").innerText =
        "主人公：" + (gender || "未決定") + "\n" +
        "動物：" + (animal || "未決定") + "\n" +
        "現在ルート：" + (route || "未選択");
    }

    function render(stage, bg, speaker, text, choices) {
      document.getElementById("stage").innerText = stage;
      document.getElementById("bg").innerText = bg;
      document.getElementById("speaker").innerText = speaker;
      document.getElementById("story").innerText = text;
      updateStatus();

      const box = document.getElementById("choices");
      box.innerHTML = "";

      choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.innerText = choice.text;
        btn.onclick = choice.onClick;
        box.appendChild(btn);
      });
    }

    function showStart() {
      gender = "";
      animal = "";
      route = "";
      render(
        "共通編 / 第1部屋",
        "背景イメージ：暗闇の部屋",
        "SYSTEM",
`暗闇の部屋。

犬か猫の鳴き声がする。`,
        [
          {
            text: "犬を選ぶ",
            onClick: () => {
              gender = "男主人公";
              animal = "犬";
              showDoorRoom();
            }
          },
          {
            text: "猫を選ぶ",
            onClick: () => {
              gender = "女主人公";
              animal = "猫";
              showDoorRoom();
            }
          }
        ]
      );
    }

    function showDoorRoom() {
      const line = gender === "女主人公"
        ? "扉が3つ……？ なんか全部、嫌な感じがする……。"
        : "……扉が3つある。どれも普通じゃない。";

      const animalLine = animal === "猫"
        ? "猫は3つの扉の前を静かに歩き、一瞬だけ真ん中の扉を見た。"
        : "犬は左の扉の前で止まり、低く唸っている。";

      render(
        "共通編 / 第2部屋",
        "背景イメージ：3つの扉のある広間",
        "SYSTEM",
`${gender}

${line}

左の扉からは冷たい空気が流れ込んでくる。
真ん中の扉からは、消毒液のような匂いが漂ってくる。
右の扉は重く閉ざされ、機械のような音が漏れている。

${animalLine}

ここで進む場所を決めなければならない。`,
        [
          {
            text: "左の扉に入る（ホテル）",
            onClick: showHotelLobby
          },
          {
            text: "真ん中の扉に入る（廃病院）",
            onClick: showHospitalEntrance
          },
          {
            text: animal + "に任せる",
            onClick: () => {
              if (animal === "猫") {
                showHospitalEntrance();
              } else {
                showHotelLobby();
              }
            }
          }
        ]
      );
    }

    function showHotelLobby() {
      route = "ホテル";
      const line = gender === "女主人公"
        ? "ここ……ホテル……？ 静かすぎる……。"
        : "……ホテル……？ 誰もいない。";

      render(
        "ホテル編 / 第3部屋",
        "背景イメージ：ホテルのロビー",
        "SYSTEM",
`${gender}

${line}

フロントには誰もいない。
時計は止まり、シャンデリアだけが揺れている。

床には新しい足跡がある。`,
        [
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    function showHospitalEntrance() {
      route = "廃病院";
      const line = gender === "女主人公"
        ? "ここ……病院……？ 空気が重い……。"
        : "……廃病院か。嫌な感じがする。";

      const animalLine = animal === "猫"
        ? "猫は薄暗い廊下の奥をじっと見ている。"
        : "犬は落ち着かず、床の匂いを嗅いでいる。";

      render(
        "廃病院編 / 第3部屋",
        "背景イメージ：廃病院の入口",
        "SYSTEM",
`${gender}

${line}

壁は汚れ、照明は点滅している。
遠くで金属が擦れるような音がした。

${animalLine}

この先に進めば、もう戻れない気がする。`,
        [
          {
            text: "廊下へ進む",
            onClick: showHospitalCorridor
          },
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    function showHospitalCorridor() {
      const line = gender === "女主人公"
        ? "誰か……いる……？"
        : "……気配がする。誰かいるな。";

      render(
        "廃病院編 / 第4部屋",
        "背景イメージ：長い病院の廊下",
        "SYSTEM",
`${gender}

${line}

長い廊下の先に、人影のようなものが見えた。

顔は見えない。
だが、こちらを見ている気がする。

空気が一気に冷たくなる。`,
        [
          {
            text: "隠れる",
            onClick: showHospitalHide
          },
          {
            text: "逃げる",
            onClick: showHospitalRun
          },
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    function showHospitalHide() {
      render(
        "廃病院編 / 第5部屋",
        "背景イメージ：診察室の影",
        "SYSTEM",
`${gender}

あなたは物陰に身を隠した。

足音が近づいてくる。

やがて、覆面をつけた誰かがゆっくり通り過ぎていった。

……人間だ。
だが、普通じゃない。`,
        [
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    function showHospitalRun() {
      render(
        "廃病院編 / 第5部屋",
        "背景イメージ：非常階段前",
        "SYSTEM",
`${gender}

あなたは反射的に走り出した。

背後で足音が速くなる。

追ってきている。

この病院には、危険な何かがいる。`,
        [
          {
            text: "最初から",
            onClick: showStart
          }
        ]
      );
    }

    showStart();
  </script>
</body>
</html>
